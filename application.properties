# SSL/TLS Configuration for Artemis Financial Secure Communications
# Converts application from HTTP to HTTPS to protect data in transit
# Fulfills software security requirement identified in vulnerability assessment

# Port 8443 is the standard HTTPS alternative port for development environments
server.port=8443

# Alias must match the alias specified during keytool certificate generation
server.ssl.key-alias=artemis

# Password set during keytool -genkeypair execution
server.ssl.key-store-password=artemis123

# PKCS12 keystore generated via Java Keytool, stored in src/main/resources
# classpath: prefix allows Spring Boot to locate the file at runtime
server.ssl.key-store=classpath:artemis-keystore.p12

# PKCS12 is the modern, recommended keystore format replacing the legacy JKS format
server.ssl.key-store-type=PKCS12
 
